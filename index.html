<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT BOT</title>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --basic:#2563EB;  --basic-l:#DBEAFE;  --basic-d:#1E40AF;
  --loop:#16A34A;   --loop-l:#DCFCE7;   --loop-d:#166534;
  --input:#EA580C;  --input-l:#FFEDD5;  --input-d:#9A3412;
  --radio:#7C3AED;  --radio-l:#EDE9FE;  --radio-d:#5B21B6;
  --music:#0D9488;  --music-l:#CCFBF1;  --music-d:#0F766E;
  --bg:#F0F4FF; --card:#FFF; --text:#1E293B; --muted:#64748B;
  --border:#E2E8F0; --correct:#16A34A; --wrong:#DC2626;
  --warn:#F59E0B; --star:#F59E0B; --radius:16px;
  --shadow:0 4px 24px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.screen-body{flex:1;overflow-y:auto;padding:16px 16px 32px}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.topbar-title{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--text);display:flex;gap:6px;align-items:center}
.topbar-title span{color:var(--basic)}
.topbar-right{display:flex;gap:6px;align-items:center}
.lang-toggle{display:flex;background:var(--bg);border-radius:20px;padding:3px}
.lang-btn{padding:3px 11px;border-radius:16px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.78rem;background:transparent;color:var(--muted);transition:all .2s}
.lang-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
.icon-btn:hover{background:var(--border)}

/* PROGRESS BAR */
.prog-bar{height:5px;background:var(--border)}
.prog-fill{height:100%;transition:width .4s ease}

/* HOME */
#home{background:linear-gradient(155deg,#EFF6FF 0%,#F0FDF4 50%,#FEF3C7 100%)}
.home-hero{text-align:center;padding:24px 16px 12px}
.home-hero h1{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--text);line-height:1.2}
.home-hero h1 em{font-style:normal;color:var(--basic)}
.home-hero p{color:var(--muted);margin-top:6px;font-size:.9rem}
.robot-badge{width:72px;height:72px;margin:0 auto 14px;background:var(--text);border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:2.2rem;
  box-shadow:0 6px 20px rgba(30,41,59,.25);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.student-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;padding:6px 16px 14px}
.student-row label{font-weight:800;font-size:.85rem}
.student-row select{padding:7px 12px;border-radius:20px;border:2px solid var(--border);font-family:'Nunito',sans-serif;
  font-size:.85rem;font-weight:700;background:#fff;cursor:pointer;color:var(--text)}
.student-row select:focus{outline:none;border-color:var(--basic)}

.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:0 16px 24px}
.level-card{background:#fff;border-radius:var(--radius);padding:18px 14px;cursor:pointer;
  border:3px solid transparent;box-shadow:var(--shadow);transition:all .25s;text-align:center;
  position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.level-card.lv-basic::before{background:var(--basic)} .level-card.lv-loop::before{background:var(--loop)}
.level-card.lv-input::before{background:var(--input)} .level-card.lv-radio::before{background:var(--radio)}
.level-card.lv-music::before{background:var(--music)}
.level-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.15)}
.level-card:active{transform:scale(.97)}
.lv-icon{font-size:2rem;margin-bottom:8px}
.lv-name{font-family:'Fredoka One',cursive;font-size:1.05rem;margin-bottom:3px}
.lv-basic .lv-name{color:var(--basic)} .lv-loop .lv-name{color:var(--loop)}
.lv-input .lv-name{color:var(--input)} .lv-radio .lv-name{color:var(--radio)}
.lv-music .lv-name{color:var(--music)}
.lv-ct{font-size:.68rem;color:var(--muted);margin-bottom:8px;line-height:1.3}
.lv-prog-wrap{height:5px;background:var(--border);border-radius:3px}
.lv-prog-bar{height:100%;border-radius:3px;transition:width .5s}
.lv-basic .lv-prog-bar{background:var(--basic)} .lv-loop .lv-prog-bar{background:var(--loop)}
.lv-input .lv-prog-bar{background:var(--input)} .lv-radio .lv-prog-bar{background:var(--radio)}
.lv-music .lv-prog-bar{background:var(--music)}
.lv-prog-text{font-size:.65rem;color:var(--muted);margin-top:3px}
.new-badge{position:absolute;top:10px;right:10px;font-size:.62rem;font-weight:800;
  padding:2px 7px;border-radius:10px;background:var(--warn);color:#fff}

/* MODE SCREEN */
.mode-hero{padding:18px 16px 8px;text-align:center}
.mode-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.82rem;font-weight:800;margin-bottom:8px}
.mode-hero h2{font-family:'Fredoka One',cursive;font-size:1.5rem;margin-bottom:4px}
.mode-hero p{color:var(--muted);font-size:.85rem}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px 24px}
.mode-card{background:#fff;border-radius:var(--radius);padding:22px 14px;cursor:pointer;
  border:3px solid var(--border);box-shadow:var(--shadow);transition:all .25s;text-align:center}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.12)}
.mode-card.mc-unplug{border-color:var(--warn)}
.mode-card.mc-plug{border-color:var(--basic)}
.mc-icon{font-size:2.4rem;margin-bottom:10px}
.mc-title{font-family:'Fredoka One',cursive;font-size:1.05rem;margin-bottom:5px}
.mc-desc{font-size:.75rem;color:var(--muted);line-height:1.4}
.mc-count{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:10px;
  font-size:.7rem;font-weight:800;background:var(--bg);color:var(--muted)}

/* ACTIVITY LIST */
.list-head{padding:14px 16px 4px}
.list-head h2{font-family:'Fredoka One',cursive;font-size:1.3rem}
.list-head p{font-size:.82rem;color:var(--muted);margin-top:2px}
.act-list{display:flex;flex-direction:column;gap:10px;padding:10px 16px 24px}
.act-row{background:#fff;border-radius:var(--radius);padding:14px 16px;cursor:pointer;
  border:2px solid var(--border);display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .2s}
.act-row:hover{border-color:var(--basic);transform:translateX(3px)}
.act-row.done{background:#F0FDF4;border-color:#86EFAC}
.act-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0}
.act-info{flex:1}
.act-name{font-weight:800;font-size:.9rem;margin-bottom:1px}
.act-meta{font-size:.72rem;color:var(--muted)}
.act-status{font-size:1.2rem}
.type-badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.65rem;font-weight:800;
  margin-left:6px;vertical-align:middle}

/* ACTIVITY SCREEN COMMON */
.act-header{padding:14px 16px 0}
.act-title{font-family:'Fredoka One',cursive;font-size:1.15rem;margin-bottom:2px}
.act-sub{font-size:.78rem;color:var(--muted)}
.task-box{background:#FFFBEB;border:2px solid var(--warn);border-radius:var(--radius);
  padding:12px 14px;margin:12px 16px;display:flex;gap:10px;align-items:flex-start}
.task-box .tb-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.task-box .tb-text{font-size:.87rem;font-weight:700;line-height:1.5}

/* DRAG & DROP */
.dnd-wrap{padding:0 16px 16px}
.dnd-section-label{font-size:.72rem;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.item-bank{display:flex;flex-wrap:wrap;gap:7px;min-height:52px;padding:10px;
  background:#fff;border:2px dashed var(--border);border-radius:var(--radius);margin-bottom:14px}
.item-bank.highlight-drop{border-color:var(--basic);background:#EFF6FF}
.drag-chip{padding:7px 12px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:grab;
  user-select:none;border:2px solid transparent;transition:all .15s;
  display:flex;align-items:center;gap:5px;touch-action:none}
.drag-chip:hover{transform:scale(1.05);box-shadow:0 3px 10px rgba(0,0,0,.15)}
.drag-chip.dragging{opacity:.3;cursor:grabbing}
.drag-chip.selected{outline:3px solid var(--basic);outline-offset:2px}
.drop-row{min-height:46px;border:2px dashed var(--border);border-radius:10px;
  padding:6px 10px;display:flex;align-items:center;gap:8px;
  background:var(--bg);transition:all .15s;margin-bottom:7px}
.drop-row.drag-over{border-color:var(--basic);background:#EFF6FF;transform:scale(1.01)}
.drop-row.correct-slot{border-color:var(--correct);background:#F0FDF4}
.drop-row.wrong-slot{border-color:var(--wrong);background:#FEF2F2;animation:shake .35s}
.slot-num{width:26px;height:26px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-weight:800;
  font-size:.75rem;color:var(--muted);flex-shrink:0}
.slot-hint{font-size:.72rem;color:var(--muted);font-style:italic}
.slot-feedback{font-size:.8rem;font-weight:700;margin-left:auto}

/* PSEUDOCODE CARD */
.pc-wrap{padding:0 16px 20px}
.pc-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:2px solid var(--border)}
.pc-top{padding:14px;border-bottom:2px solid var(--border)}
.pc-task{font-weight:800;font-size:.9rem;margin-bottom:8px;line-height:1.4}
.pc-microbit{display:flex;align-items:center;gap:10px}
.mb-display{width:78px;height:50px;background:#1a1a2e;border-radius:8px;
  display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:6px;flex-shrink:0}
.led{border-radius:2px;transition:background .3s}
.led.on{background:#FF6B35;box-shadow:0 0 5px #FF6B35}
.led.off{background:#2d2d4e}
.mb-label{font-size:.7rem;color:var(--muted)}
.pc-body{display:grid;grid-template-columns:1fr 1fr}
.pc-bank,.pc-seq{padding:12px}
.pc-bank{border-right:2px solid var(--border)}
.pc-section-lbl{font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px}
.code-blocks{display:flex;flex-direction:column;gap:5px}
.code-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;
  cursor:grab;font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;
  border:2px solid transparent;transition:all .15s;touch-action:none;line-height:1.3}
.code-chip:hover{transform:translateX(2px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.code-chip.dragging{opacity:.25}
.code-chip.selected{outline:3px solid var(--basic);outline-offset:1px}
.chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.seq-slots{display:flex;flex-direction:column;gap:5px}
.seq-slot{min-height:38px;border:2px dashed var(--border);border-radius:7px;padding:3px 7px;
  display:flex;align-items:center;gap:5px;background:var(--bg);transition:all .15s}
.seq-slot.drag-over{border-color:var(--basic);background:#EFF6FF}
.seq-slot.correct-slot{border-color:var(--correct);background:#F0FDF4}
.seq-slot.wrong-slot{border-color:var(--wrong);background:#FEF2F2;animation:shake .35s}
.seq-slot.prefilled{border-style:solid;border-color:var(--border);background:#fff;cursor:not-allowed}
.slot-idx{font-size:.65rem;font-weight:800;color:var(--muted);min-width:14px}
.pc-actions{padding:10px 12px;border-top:2px solid var(--border);display:flex;gap:7px;flex-wrap:wrap}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.85rem;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--basic);color:#fff}
.btn-success{background:var(--correct);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 12px;font-size:.78rem;border-radius:9px}
.btn-back{background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:700;font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:3px;padding:6px 0}
.btn-back:hover{color:var(--text)}
.act-btns{padding:0 16px 20px;display:flex;gap:8px;flex-wrap:wrap}
.hint-btn{background:#FFFBEB;border:2px solid var(--warn);border-radius:8px;padding:5px 11px;
  font-size:.77rem;font-weight:800;cursor:pointer;color:#92400E;display:inline-flex;align-items:center;gap:4px;
  font-family:'Nunito',sans-serif;transition:all .2s}
.hint-btn:hover{background:#FEF9C3}

/* SELECT ACTIVITY */
.select-grid{display:flex;flex-direction:column;gap:7px;padding:0 16px 14px}
.sel-chip{padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;font-size:.85rem;
  border:2px solid var(--border);background:#fff;display:flex;align-items:center;gap:8px;transition:all .2s}
.sel-chip:hover{border-color:var(--basic)}
.sel-chip.selected{border-color:var(--basic);background:#EFF6FF;outline:2px solid var(--basic)}
.sel-chip.correct-sel{border-color:var(--correct);background:#F0FDF4}
.sel-chip.wrong-sel{border-color:var(--wrong);background:#FEF2F2}
.sel-chip.missed-sel{border-color:var(--warn);background:#FFFBEB}

/* CATEGORISE */
.cat-zones{display:flex;flex-direction:column;gap:12px;padding:0 16px 14px}
.cat-zone-wrap{background:#fff;border-radius:var(--radius);overflow:hidden;border:2px solid var(--border)}
.cat-zone-hdr{padding:8px 12px;font-weight:800;font-size:.82rem;border-bottom:2px solid var(--border)}
.cat-zone-body{min-height:52px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;
  transition:all .2s;background:var(--bg)}
.cat-zone-body.drag-over{background:#EFF6FF;border-color:var(--basic)}
.cat-empty{font-size:.72rem;color:var(--muted);font-style:italic;padding:4px}

/* DEBUG ACTIVITY */
.debug-sequence{display:flex;flex-direction:column;gap:6px;padding:0 16px 14px}
.debug-item{padding:10px 14px;border-radius:10px;border:2px solid var(--border);background:#fff;
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.debug-item:hover{border-color:var(--basic)}
.debug-item.selected-bug{border-color:var(--wrong);background:#FEF2F2;outline:2px solid var(--wrong)}
.debug-item.correct-bug{border-color:var(--correct);background:#F0FDF4}
.debug-item.wrong-bug{border-color:var(--wrong);background:#FEF2F2}
.debug-num{width:26px;height:26px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;color:var(--muted);flex-shrink:0}
.debug-text{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;flex:1;line-height:1.4}
.bug-icon{font-size:1.1rem;margin-left:auto}

/* FILL BLANK PSEUDO */
.fill-hint-text{font-size:.72rem;color:var(--muted);font-style:italic;padding:3px 0 0 14px}

/* RESULTS */
.results-body{text-align:center;padding:32px 20px}
.res-stars{font-size:2.4rem;margin-bottom:12px;letter-spacing:3px;animation:popIn .5s ease}
.res-score{font-size:3.5rem;font-weight:900;line-height:1;font-family:'Fredoka One',cursive}
.res-label{font-size:.85rem;color:var(--muted);margin-bottom:18px}
.res-msg{font-size:1rem;font-weight:700;padding:14px;border-radius:var(--radius);margin-bottom:18px;line-height:1.5}
.res-msg.great{background:#F0FDF4;color:var(--loop-d)} .res-msg.ok{background:#FFFBEB;color:#92400E}
.res-msg.retry{background:#FEF2F2;color:#991B1B}
.res-acts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.res-review{margin:14px 0;text-align:left;background:#fff;border-radius:var(--radius);padding:12px;border:2px solid var(--border)}
.res-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.res-item:last-child{border-bottom:none}

/* DASHBOARD */
#dashboard{background:#0F172A;color:#fff}
#dashboard .topbar{background:#1E293B;border-bottom-color:#334155}
.dash-body{padding:16px}
.dash-h{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:4px}
.dash-sub{color:#94A3B8;font-size:.82rem;margin-bottom:18px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.dash-stat{background:#1E293B;border-radius:12px;padding:14px;text-align:center}
.ds-val{font-family:'Fredoka One',cursive;font-size:2rem}
.ds-lbl{font-size:.72rem;color:#94A3B8;margin-top:2px}
.dash-stat.s-blue{border-left:4px solid #3B82F6} .dash-stat.s-green{border-left:4px solid #22C55E}
.dash-stat.s-orange{border-left:4px solid #F97316} .dash-stat.s-purple{border-left:4px solid #A855F7}
.prog-tbl{background:#1E293B;border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.pt-head,.pt-row{display:grid;grid-template-columns:100px repeat(5,1fr);padding:10px 14px;gap:4px;align-items:center}
.pt-head{background:#334155;font-size:.68rem;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.04em}
.pt-row{border-bottom:1px solid #334155}
.pt-row:last-child{border:none}
.pt-name{font-weight:700;font-size:.82rem}
.pt-cell{text-align:center}
.pt-pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.67rem;font-weight:800}
.pt-pill.done{background:#14532D;color:#86EFAC} .pt-pill.part{background:#713F12;color:#FDE68A}
.pt-pill.none{background:#1E293B;color:#475569;border:1px solid #334155}
.log-box{background:#1E293B;border-radius:var(--radius);overflow:hidden}
.log-hdr{padding:12px 14px;font-weight:800;font-size:.88rem;border-bottom:1px solid #334155}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #0F172A;font-size:.78rem}
.log-t{color:#64748B;font-family:'Space Mono',monospace;font-size:.65rem;min-width:40px}
.log-s{font-weight:800}
.log-a{color:#94A3B8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-p{font-weight:800}
.log-p.hi{color:#22C55E} .log-p.mid{color:#F59E0B} .log-p.lo{color:#EF4444}

/* PIN */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;
  align-items:center;justify-content:center;z-index:200}
.pin-overlay.show{display:flex}
.pin-box{background:#1E293B;border-radius:var(--radius);padding:26px;width:290px;text-align:center}
.pin-box h3{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#fff;margin-bottom:4px}
.pin-box p{color:#94A3B8;font-size:.83rem;margin-bottom:14px}
.pin-input{width:100%;padding:9px;border-radius:8px;border:2px solid #334155;background:#0F172A;
  color:#fff;font-family:'Space Mono',monospace;font-size:1.4rem;text-align:center;letter-spacing:7px;
  margin-bottom:10px}
.pin-input:focus{outline:none;border-color:#3B82F6}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--text);color:#fff;padding:11px 18px;border-radius:12px;
  font-weight:700;font-size:.87rem;z-index:300;transition:transform .3s ease;

  if (screenId === 'home')    { renderHome(); }
  if (screenId === 'mode')    { renderMode(); }
  if (screenId === 'actlist') { G.mode = modeArg; G.ctFilter = 'all'; renderActList(); }
  refreshLang();
}

function openDashboard() {
  document.getElementById('pinOverlay').classList.add('show');
  document.getElementById('pinInput').value = '';
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}
function closePinOverlay() { document.getElementById('pinOverlay').classList.remove('show'); }
function checkPin(v) {
  if (v === '1234') {
    closePinOverlay();
    renderDashboard();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('dashboard').classList.add('active');
    refreshLang();
  }
}
function clearAllData() {
  if (!confirm('Delete ALL student data?\nPadam SEMUA data pelajar?')) return;
  G.prog = {}; G.log = []; saveStorage(); renderDashboard();
  showToast(G.lang === 'bm' ? 'Data dipadam!' : 'All data cleared!', 'ok');
}

// ═══════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════
function setLang(l) {
  G.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === l.toUpperCase()));
  refreshLang();
}
function refreshLang() {
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + G.lang) || el.getAttribute('data-en');
  });
}
function T(obj) { return obj ? (G.lang === 'bm' && obj.bm ? obj.bm : obj.en) : ''; }

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = LEVELS.map((lv, i) => {
    const pct = calcLevelProgress(lv.id);
    return `<div class="level-card ${lv.cls} pop-in fade-up" style="animation-delay:${i * 0.07}s" onclick="selectLevel('${lv.id}')">
      ${lv.isNew ? '<div class="new-badge">NEW</div>' : ''}
      <div class="lv-icon">${lv.icon}</div>
      <div class="lv-name">${T(lv)}</div>
      <div class="lv-ct">${lv.ct}</div>
      <div class="lv-prog-wrap"><div class="lv-prog-bar" style="width:${pct}%"></div></div>
      <div class="lv-prog-text">${pct}% ${G.lang === 'bm' ? 'selesai' : 'complete'}</div>
    </div>`;
  }).join('');
}

function calcLevelProgress(lvId) {
  if (!G.student) return 0;
  const u = (UNPLUGGED[lvId] || []).length;
  const p = (PSEUDOCARDS[lvId] || []).length;
  const total = u + p; if (!total) return 0;
  let done = 0;
  for (let i = 0; i < u; i++) if (G.prog[`${G.student}_${lvId}_u_${i}`]?.done) done++;
  for (let i = 0; i < p; i++) if (G.prog[`${G.student}_${lvId}_p_${i}`]?.done) done++;
  return Math.round(done / total * 100);
}

function selectLevel(id) {
  if (!G.student) { showToast(G.lang === 'bm' ? '⚠️ Sila pilih nama murid dahulu!' : '⚠️ Please select your name first!', 'err'); return; }
  G.level = id; nav('mode');
}

// ═══════════════════════════════════════
// MODE
// ═══════════════════════════════════════
function renderMode() {
  const l = lv(G.level);
  const tag = document.getElementById('modeTag');
  tag.textContent = T(l);
  tag.style.background = `var(${l.cssVar}-l)`;
  tag.style.color = `var(${l.cssVar})`;
  document.getElementById('modeTbarTitle').innerHTML = `${l.icon} <span>${T(l)}</span>`;
  const uCount = (UNPLUGGED[G.level] || []).length;
  const pCount = (PSEUDOCARDS[G.level] || []).length;
  document.getElementById('unplugCount').textContent = uCount + (G.lang === 'bm' ? ' aktiviti (4 kategori CT)' : ' activities (4 CT categories)');
  document.getElementById('plugCount').textContent = pCount + (G.lang === 'bm' ? ' kad pseudokod' : ' pseudocode cards');
}

// ═══════════════════════════════════════
// ACTIVITY LIST
// ═══════════════════════════════════════
function renderActList() {
  const l = lv(G.level);
  const isUnplug = G.mode === 'unplugged';
  const acts = isUnplug ? (UNPLUGGED[G.level] || []) : (PSEUDOCARDS[G.level] || []);
  const modeKey = isUnplug ? 'u' : 'p';

  document.getElementById('actlistTitle').innerHTML = `${l.icon} ${T(l)}`;
  document.getElementById('listHeading').textContent = isUnplug
    ? (G.lang === 'bm' ? '🎮 Aktiviti Tanpa Peranti' : '🎮 Unplugged Activities')
    : (G.lang === 'bm' ? '💻 Kad Pseudokod' : '💻 Pseudocode Cards');

  if (!acts.length) {
    document.getElementById('ctFilterBar').style.display = 'none';
    document.getElementById('listSub').textContent = '';
    document.getElementById('activityList').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">
      <div style="font-size:3rem;margin-bottom:10px">🚧</div>
      <div style="font-weight:800">${G.lang === 'bm' ? 'Akan datang!' : 'Coming soon!'}</div></div>`;
    return;
  }

  // Build CT filter bar (only for unplugged — which has ctCat field)
  const filterBar = document.getElementById('ctFilterBar');
  if (isUnplug) {
    filterBar.style.display = 'block';
    filterBar.className = 'ct-filter-bar';
    const allLabel = G.lang === 'bm' ? 'Semua' : 'All';
    filterBar.innerHTML = `
      <div class="ct-tab active" id="ctf_all" onclick="filterCT('all')" style="background:var(--text);color:#fff">
        ✨ ${allLabel}
      </div>` +
      CT_CATS.map(cat => `
        <div class="ct-tab" id="ctf_${cat.id}" onclick="filterCT('${cat.id}')"
             style="background:${cat.bg};color:${cat.color};border-color:${cat.border}">
          <span class="ct-icon">${cat.icon}</span>
          <span>${G.lang === 'bm' ? cat.bm : cat.en}</span>
        </div>`).join('');
  } else {
    filterBar.style.display = 'none';
  }

  G.ctFilter = G.ctFilter || 'all';
  if (!isUnplug) G.ctFilter = 'all';
  renderActListItems(acts, modeKey, isUnplug, l);
}

function filterCT(catId) {
  G.ctFilter = catId;
  document.querySelectorAll('.ct-tab').forEach(t => {
    const tid = t.id.replace('ctf_', '');
    t.classList.toggle('active', tid === catId);
    if (tid === catId) {
      if (catId === 'all') { t.style.background = 'var(--text)'; t.style.color = '#fff'; }
      // cat tabs keep their bg colour — already set via inline style
    } else {
      if (tid === 'all') { t.style.background = 'var(--bg)'; t.style.color = 'var(--muted)'; }
    }
  });
  const l = lv(G.level);
  const isUnplug = G.mode === 'unplugged';
  const acts = UNPLUGGED[G.level] || [];
  renderActListItems(acts, 'u', isUnplug, l);
}

function renderActListItems(acts, modeKey, isUnplug, l) {
  const typeLabels    = { sequence:'Sequence', categorise:'Sort', debug:'Debug 🐛', select:'Select', arrange:'Arrange', fill:'Fill Blank' };
  const typeLabelsBm  = { sequence:'Urutan', categorise:'Isih', debug:'Debug 🐛', select:'Pilih', arrange:'Susun', fill:'Isi Kosong' };
  const filterCat = G.ctFilter || 'all';

  let html = '';

  if (isUnplug && filterCat === 'all') {
    // Group by CT category
    CT_CATS.forEach(cat => {
      const catActs = acts.map((a,i) => ({...a, origIdx:i})).filter(a => a.ctCat === cat.id);
      if (!catActs.length) return;
      html += `<div class="cat-section-hdr">
        <div class="cs-dot" style="background:${cat.color}"></div>
        <div>
          <div class="cs-label" style="color:${cat.color}">${cat.icon} ${G.lang === 'bm' ? cat.bm : cat.en}</div>
          <div class="cs-sub">${catActs.length} ${G.lang === 'bm' ? 'aktiviti' : 'activities'}</div>
        </div>
      </div>
      <div class="cat-divider" style="background:${cat.color}"></div>`;
      catActs.forEach((act) => {
        html += actRowHtml(act, act.origIdx, modeKey, l, typeLabels, typeLabelsBm, cat);
      });
    });
  } else {
    // Filtered or pseudocode
    const filtered = acts.map((a,i) => ({...a, origIdx:i})).filter(a =>
      !isUnplug || filterCat === 'all' || a.ctCat === filterCat
    );
    if (!filtered.length) {
      html = `<div style="text-align:center;padding:32px;color:var(--muted)">
        <div style="font-size:2.5rem;margin-bottom:8px">🔍</div>
        <div style="font-weight:700">${G.lang === 'bm' ? 'Tiada aktiviti dalam kategori ini' : 'No activities in this category'}</div>
      </div>`;
    } else {
      filtered.forEach(act => {
        const cat = isUnplug ? ctCat(act.ctCat) : null;
        html += actRowHtml(act, act.origIdx, modeKey, l, typeLabels, typeLabelsBm, cat);
      });
    }
  }

  const count = isUnplug && filterCat !== 'all'
    ? acts.filter(a => a.ctCat === filterCat).length
    : acts.length;
  document.getElementById('listSub').textContent = count + (G.lang === 'bm' ? ' aktiviti tersedia' : ' activities available');
  document.getElementById('activityList').innerHTML = html;
}

function actRowHtml(act, idx, modeKey, l, typeLabels, typeLabelsBm, cat) {
  const key = `${G.student}_${G.level}_${modeKey}_${idx}`;
  const rec = G.prog[key];
  const done = rec?.done;
  const tLabel = G.lang === 'bm' ? (typeLabelsBm[act.type] || act.type) : (typeLabels[act.type] || act.type);
  const scoreStr = done ? ` · ${rec.pct}%` : '';
  const catBadge = cat ? `<span class="ct-cat-badge" style="background:${cat.bg};color:${cat.color};border:1px solid ${cat.border}">
    ${cat.icon} ${G.lang === 'bm' ? cat.bm : cat.en}
  </span>` : '';
  return `<div class="act-row ${done ? 'done' : ''} fade-up" onclick="startActivity(${idx})">
    <div class="act-num" style="background:var(${l.cssVar})">${idx + 1}</div>
    <div class="act-info">
      <div class="act-name">${T(act)}</div>
      <div class="act-meta">${catBadge}
        <span class="type-badge" style="background:var(${l.cssVar}-l);color:var(${l.cssVar})">${tLabel}</span>${scoreStr}
      </div>
    </div>
    <div class="act-status">${done ? '✅' : '▶️'}</div>
  </div>`;
}


function startActivity(idx) {
  G.actIdx = idx;
  const l = lv(G.level);
  const isUnplug = G.mode === 'unplugged';
  const acts = isUnplug ? (UNPLUGGED[G.level] || []) : (PSEUDOCARDS[G.level] || []);
  const total = acts.length;
  document.getElementById('actBackBtn').onclick = () => nav('actlist', G.mode);
  document.getElementById('actTbarTitle').innerHTML = `${l.icon} ${T(l)}`;
  document.getElementById('actProgFill').style.width = `${(idx / total) * 100}%`;
  document.getElementById('actProgFill').style.background = `var(${l.cssVar})`;
  G.selectedChip = null;
  if (isUnplug) renderUnpluggedActivity(acts[idx], idx);
  else renderPseudocard(acts[idx], idx);
  nav('activity');
  document.getElementById('activity').classList.add('active'); // nav already set it
}

// ACTIVITY RENDERERS

// ── SEQUENCE ──────────────────────────
function renderUnpluggedActivity(act, idx) {
  const body = document.getElementById('actBody');
  if (act.type === 'sequence') renderSequence(body, act, idx);
  else if (act.type === 'categorise') renderCategorise(body, act, idx);
  else if (act.type === 'debug') renderDebug(body, act, idx);
  else if (act.type === 'select') renderSelect(body, act, idx);
}

function actHeader(act, idx, mode) {
  const l = lv(G.level);
  const acts = mode === 'unplugged' ? (UNPLUGGED[G.level] || []) : (PSEUDOCARDS[G.level] || []);
  const cat = act.ctCat ? ctCat(act.ctCat) : null;
  const catBanner = cat ? `<div class="ct-cat-card" style="background:${cat.bg};border-color:${cat.border};color:${cat.color}">
    <div class="ctc-icon">${cat.icon}</div>
    <div>
      <div class="ctc-name">${G.lang === 'bm' ? cat.bm : cat.en}</div>
      <div class="ctc-desc">${G.lang === 'bm' ? getCatDescBm(cat.id) : getCatDescEn(cat.id)}</div>
    </div>
  </div>` : '';
  return `<div class="act-header">
    <div class="act-title">${T(act)}</div>
    <div class="act-sub">Activity ${idx + 1}/${acts.length}</div>
  </div>
  ${catBanner}
  <div class="task-box">
    <div class="tb-icon">💡</div>
    <div class="tb-text">${G.lang === 'bm' ? act.briefBm : act.briefEn}</div>
  </div>`;
}

function getCatDescEn(catId) {
  const d = {
    pattern:   'Finding repeating elements and structures',
    logical:   'Using IF–THEN reasoning to solve problems',
    abstract:  'Keeping only what is essential for the task',
    algorithm: 'Writing exact step-by-step instructions',
  };
  return d[catId] || '';
}
function getCatDescBm(catId) {
  const d = {
    pattern:   'Mencari elemen dan struktur yang berulang',
    logical:   'Menggunakan penaakulan JIKA–MAKA untuk selesaikan masalah',
    abstract:  'Menyimpan hanya apa yang penting untuk tugasan',
    algorithm: 'Menulis arahan langkah demi langkah yang tepat',
  };
  return d[catId] || '';
}

function actionBtns(checkFn, resetFn, hintMsg) {
  return `<div class="act-btns">
    <button class="btn btn-primary" onclick="${checkFn}">✅ ${G.lang === 'bm' ? 'Semak Jawapan' : 'Check Answer'}</button>
    <button class="btn btn-secondary" onclick="${resetFn}">🔄 ${G.lang === 'bm' ? 'Cuba Semula' : 'Reset'}</button>
    <button class="hint-btn" onclick="showHint('${hintMsg.replace(/'/g,"&#39;")}')">💡 ${G.lang === 'bm' ? 'Petunjuk' : 'Hint'}</button>
  </div>`;
}

// SEQUENCE
function renderSequence(body, act, idx) {
  const items = shuffle([...act.items]);
  body.innerHTML = actHeader(act, idx, 'unplugged') + `
  <div class="dnd-wrap">
    <div class="dnd-section-label">📦 ${G.lang === 'bm' ? 'Bank Item — Seret ke bawah!' : 'Item Bank — Drag to sequence below!'}</div>
    <div class="item-bank" id="itemBank" ondragover="bankDragOver(event)" ondrop="bankDrop(event)">
      ${items.map(it => chipHtml(it, 'dc', 'bank')).join('')}

    <div class="dnd-section-label">📋 ${G.lang === 'bm' ? 'Urutan Anda' : 'Your Sequence'}</div>
    <div id="dropZones">
      ${act.answer.map((_, i) => `
        <div class="drop-row" id="dz${i}" ondragover="dzDragOver(event)" ondragleave="dzDragLeave(event)" ondrop="dzDrop(event,${i})">
          <div class="slot-num">${i + 1}</div>
          <div class="slot-hint">${G.lang === 'bm' ? 'Lepaskan di sini' : 'Drop here'}</div>
        </div>`).join('')}
    </div>
  </div>` + actionBtns(`checkSeq(${idx})`, `startActivity(${idx})`, G.lang === 'bm' ? act.hintBm : act.hintEn);
  initMobileTap();
}

// CATEGORISE
function renderCategorise(body, act, idx) {
  const items = shuffle([...act.items]);
  body.innerHTML = actHeader(act, idx, 'unplugged') + `
  <div class="dnd-wrap">
    <div class="dnd-section-label">📦 ${G.lang === 'bm' ? 'Item — Seret ke kategori' : 'Items — Drag to category'}</div>
    <div class="item-bank" id="itemBank" ondragover="bankDragOver(event)" ondrop="bankDrop(event)">
      ${items.map(it => chipHtml(it, 'dc', 'bank')).join('')}
    </div>

  <div class="cat-zones">
    ${act.categories.map(cat => `
      <div class="cat-zone-wrap">
        <div class="cat-zone-hdr" style="background:var(${lv(G.level).cssVar}-l);color:var(${lv(G.level).cssVar})">${T(cat)}</div>
        <div class="cat-zone-body" id="cat_${cat.id}" data-cat="${cat.id}"
             ondragover="catOver(event)" ondragleave="catLeave(event)" ondrop="catDrop(event,'${cat.id}')">
          <div class="cat-empty">${G.lang === 'bm' ? 'Lepaskan di sini…' : 'Drop items here…'}</div>

      </div>`).join('')}

// SELECT
function renderSelect(body, act, idx) {
  body.innerHTML = actHeader(act, idx, 'unplugged') + `
  <div class="dnd-wrap">

  <div class="select-grid">
    ${act.items.map(it => `
      <div class="sel-chip ${it.cls.replace('dc-','dc-')}" id="sel_${it.id}" onclick="toggleSel('${it.id}')">

      </div>`).join('')}

function renderDebug(body, act, idx) {

      <div class="debug-item" id="dbg_${item.id}" onclick="tapDebug('${item.id}','${act.bugId}',${idx})">

  <div class="act-btns">

  </div>`;
}

// ═══════════════════════════════════════
// PSEUDOCODE CARD RENDERER
// ═══════════════════════════════════════
function renderPseudocard(card, idx) {
  const body = document.getElementById('actBody');
  const l = lv(G.level);
  const ledHtml = card.leds.map(row => row.map(v => `<div class="led ${v ? 'on' : 'off'}"></div>`).join('')).join('');
  const freeBlocks = card.blocks.filter(b => {
    if (card.type === 'fill') {
      // in fill mode, prefilled blocks not in bank
      const usedInPrefill = (card.prefilled || []).filter(Boolean);
      return !usedInPrefill.includes(b.id) || !b.correct;
    }
    return !b.correct || true; // show all in bank, correct ones draggable
  });
  const bankBlocks = card.type === 'fill'
    ? card.blocks.filter(b => !(card.prefilled || []).includes(b.id))
    : shuffle([...card.blocks]);

  body.innerHTML = `
  <div class="act-header">
    <div class="act-title">💻 ${G.lang === 'bm' ? 'Kad Pseudokod' : 'Pseudocode Card'} ${idx + 1}/${(PSEUDOCARDS[G.level] || []).length}</div>
    <div class="act-sub">🎯 ${G.lang === 'bm' ? (card.ctBm || card.ctEn) : card.ctEn}</div>
  </div>
  <div class="task-box">
    <div class="tb-icon">🎯</div>
    <div class="tb-text"><strong>${G.lang === 'bm' ? 'Tugasan:' : 'Task:'}</strong> ${T(card)}</div>
  </div>
  <div class="pc-wrap">
    <div class="pc-card">
      <div class="pc-top">
        <div class="pc-task">${T(card)}</div>
        <div class="pc-microbit">
          <div class="mb-display">${ledHtml}</div>
          <div class="mb-label">${G.lang === 'bm' ? 'Paparan LED Micro:bit' : 'Micro:bit LED display'}</div>
        </div>
      </div>
      <div class="pc-body">
        <div class="pc-bank">
          <div class="pc-section-lbl">📦 ${G.lang === 'bm' ? 'Bank Kod' : 'Code Bank'}</div>
          <div class="code-blocks" id="codeBank">
            ${shuffle([...bankBlocks]).map(b => codeChipHtml(b)).join('')}
          </div>
        </div>
        <div class="pc-seq">
          <div class="pc-section-lbl">📋 ${G.lang === 'bm' ? 'Urutan Kod Anda' : 'Your Code Sequence'}</div>
          <div class="seq-slots" id="seqSlots">
            ${Array(card.slots).fill(0).map((_, i) => {
              const preId = card.type === 'fill' ? (card.prefilled || [])[i] : null;
              const preBlock = preId ? card.blocks.find(b => b.id === preId) : null;
              if (preBlock) {
                return `<div class="seq-slot prefilled" data-idx="${i}" data-id="${preBlock.id}">
                  <span class="slot-idx">${i + 1}</span>
                  ${codeChipHtmlInline(preBlock)}
                </div>`;
              }
              return `<div class="seq-slot" data-idx="${i}" id="ss${i}"
                ondragover="ssDragOver(event)" ondragleave="ssDragLeave(event)" ondrop="ssDrop(event,${i})">
                <span class="slot-idx">${i + 1}</span>
                <span style="color:var(--muted);font-size:.68rem;font-style:italic">${G.lang === 'bm' ? 'lepaskan di sini' : 'drop here'}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="pc-actions">
        <button class="btn btn-primary btn-sm" onclick="checkPseudo(${idx})">✅ ${G.lang === 'bm' ? 'Semak' : 'Check'}</button>
        <button class="btn btn-secondary btn-sm" onclick="startActivity(${idx})">🔄 ${G.lang === 'bm' ? 'Semula' : 'Reset'}</button>
        <button class="hint-btn" onclick="showHint('${(G.lang === 'bm' ? card.hintBm : card.hintEn).replace(/'/g,"&#39;")}')">💡 ${G.lang === 'bm' ? 'Petunjuk' : 'Hint'}</button>
      </div>
    </div>
  </div>`;
  initPseudoMobileTap();
}

// ── CHIP HTML HELPERS ──────────────────
function chipHtml(item, prefix, src) {
  const cls = item.cls || (prefix + '-gray');
  return `<div class="${prefix === 'dc' ? 'drag-chip' : 'code-chip'} ${cls}" 
    draggable="true" data-id="${item.id}" data-src="${src}"
    ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
    ${T(item)}
  </div>`;
}
function codeChipHtml(b) {
  return `<div class="code-chip ${b.cls}" draggable="true" data-id="${b.id}" data-src="codeBank"
    ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
    <div class="chip-dot"></div>${T(b)}
  </div>`;
}
function codeChipHtmlInline(b) {
  return `<div class="code-chip ${b.cls}" style="cursor:default;pointer-events:none">
    <div class="chip-dot"></div>${T(b)}
  </div>`;
}

// ═══════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════
function onDragStart(e) {
  G.drag = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.currentTarget.dataset.id);
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); }

// Drop zone (sequence rows)
function dzDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dzDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dzDrop(e, idx) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!G.drag) return;
  const zone = document.getElementById('dz' + idx);
  const existing = zone.querySelector('.drag-chip');
  if (existing) returnToBank(existing);
  const clone = G.drag.cloneNode(true);
  clone.draggable = true;
  clone.dataset.src = 'zone';
  clone.ondragstart = onDragStart;
  clone.ondragend = onDragEnd;
  zone.querySelector('.slot-hint')?.remove();
  zone.innerHTML = '';
  const num = document.createElement('div'); num.className = 'slot-num'; num.textContent = idx + 1;
  zone.appendChild(num); zone.appendChild(clone);
  G.drag.remove(); G.drag = null;
}

// Bank drop (return)
function bankDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('highlight-drop'); }
function bankDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('highlight-drop');
  if (!G.drag) return;
  const clone = G.drag.cloneNode(true);
  clone.draggable = true; clone.dataset.src = 'bank';
  clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
  document.getElementById('itemBank')?.appendChild(clone);
  G.drag.remove(); G.drag = null;
}

// Category zones
function catOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function catLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function catDrop(e, catId) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!G.drag) return;
  const zone = document.getElementById('cat_' + catId);
  zone.querySelector('.cat-empty')?.remove();
  const clone = G.drag.cloneNode(true);
  clone.draggable = true; clone.dataset.src = 'cat'; clone.dataset.cat = catId;
  clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
  zone.appendChild(clone);
  G.drag.remove(); G.drag = null;
}

// Pseudocard seq slots
function ssDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function ssDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function ssDrop(e, idx) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!G.drag) return;
  const slot = document.getElementById('ss' + idx);
  if (!slot) return;
  const existing = slot.querySelector('.code-chip');
  if (existing) { existing.remove(); returnCodeToBank(existing); }
  const clone = G.drag.cloneNode(true);
  clone.draggable = true; clone.dataset.src = 'slot';
  clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
  slot.innerHTML = `<span class="slot-idx">${idx + 1}</span>`;
  slot.appendChild(clone);
  G.drag.remove(); G.drag = null;
}

function returnToBank(chip) {
  const bank = document.getElementById('itemBank');
  if (!bank) return;
  const clone = chip.cloneNode(true);
  clone.draggable = true; clone.dataset.src = 'bank';
  clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
  bank.appendChild(clone);
}
function returnCodeToBank(chip) {
  const bank = document.getElementById('codeBank');
  if (!bank) return;
  const clone = chip.cloneNode(true);
  clone.draggable = true; clone.dataset.src = 'codeBank';
  clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
  bank.appendChild(clone);
}

// ═══════════════════════════════════════
// MOBILE TAP-TO-PLACE
// ═══════════════════════════════════════
function initMobileTap() {
  setTimeout(() => {
    document.querySelectorAll('.drag-chip').forEach(chip => {
      chip.addEventListener('click', function(e) {
        if (G.selectedChip === this) {
          this.classList.remove('selected'); G.selectedChip = null; return;
        }
        if (G.selectedChip) G.selectedChip.classList.remove('selected');
        G.selectedChip = this; this.classList.add('selected');
      });
    });
    document.querySelectorAll('.drop-row').forEach((zone, i) => {
      zone.addEventListener('click', function() {
        if (!G.selectedChip) return;
        const existing = this.querySelector('.drag-chip');
        if (existing) returnToBank(existing);
        const clone = G.selectedChip.cloneNode(true);
        clone.draggable = true; clone.dataset.src = 'zone';
        clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
        this.querySelector('.slot-hint')?.remove();
        this.innerHTML = '';
        const num = document.createElement('div'); num.className = 'slot-num'; num.textContent = i + 1;
        this.appendChild(num); this.appendChild(clone);
        G.selectedChip.remove(); G.selectedChip = null;
        initMobileTap();
      });
    });
    document.querySelectorAll('.cat-zone-body').forEach(zone => {
      zone.addEventListener('click', function() {
        if (!G.selectedChip) return;
        const catId = this.dataset.cat;
        this.querySelector('.cat-empty')?.remove();
        const clone = G.selectedChip.cloneNode(true);
        clone.draggable = true; clone.dataset.src = 'cat'; clone.dataset.cat = catId;
        clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
        this.appendChild(clone);
        G.selectedChip.remove(); G.selectedChip = null;
        initMobileTap();
      });
    });
  }, 50);
}

function initPseudoMobileTap() {
  setTimeout(() => {
    document.querySelectorAll('.code-chip[draggable="true"]').forEach(chip => {
      chip.addEventListener('click', function() {
        if (G.selectedChip === this) { this.classList.remove('selected'); G.selectedChip = null; return; }
        if (G.selectedChip) G.selectedChip.classList.remove('selected');
        G.selectedChip = this; this.classList.add('selected');
      });
    });
    document.querySelectorAll('.seq-slot:not(.prefilled)').forEach((slot, i) => {
      slot.addEventListener('click', function() {
        if (!G.selectedChip) return;
        const idx = parseInt(this.dataset.idx);
        const existing = this.querySelector('.code-chip');
        if (existing) { existing.remove(); returnCodeToBank(existing); }
        const clone = G.selectedChip.cloneNode(true);
        clone.draggable = true; clone.dataset.src = 'slot';
        clone.ondragstart = onDragStart; clone.ondragend = onDragEnd;
        this.innerHTML = `<span class="slot-idx">${idx + 1}</span>`;
        this.appendChild(clone);
        G.selectedChip.remove(); G.selectedChip = null;
        initPseudoMobileTap();
      });
    });
  }, 50);
}

function toggleSel(id) {
  const el = document.getElementById('sel_' + id);
  el.classList.toggle('selected');
}

// ═══════════════════════════════════════
// DEBUG ACTIVITY
// ═══════════════════════════════════════
function tapDebug(itemId, bugId, actIdx) {
  // Reset all
  document.querySelectorAll('.debug-item').forEach(el => {
    el.classList.remove('selected-bug', 'correct-bug', 'wrong-bug');
  });
  const isCorrect = itemId === bugId;
  const el = document.getElementById('dbg_' + itemId);
  if (isCorrect) {
    el.classList.add('correct-bug');
    el.querySelector('.bug-icon').textContent = '✅';
    const act = UNPLUGGED[G.level][actIdx];
    const fixMsg = G.lang === 'bm' ? act.bugFixBm : act.bugFixEn;
    showToast('🎉 ' + (G.lang === 'bm' ? 'Betul! ' : 'Correct! ') + fixMsg, 'ok');
    recordScore(actIdx, 'u', 100);
    setTimeout(() => showResults(1, 1, actIdx, 'u'), 1800);
  } else {
    el.classList.add('wrong-bug');
    el.querySelector('.bug-icon').textContent = '❌';
    showToast(G.lang === 'bm' ? '❌ Bukan itu. Cuba lagi!' : '❌ Not that one. Try again!', 'err');
    setTimeout(() => el.classList.remove('wrong-bug'), 1000);
  }
}

// ═══════════════════════════════════════
// CHECK ANSWERS
// ═══════════════════════════════════════
function checkSeq(idx) {
  const act = UNPLUGGED[G.level][idx];
  const zones = document.querySelectorAll('#dropZones .drop-row');
  let score = 0;
  zones.forEach((zone, i) => {
    const chip = zone.querySelector('.drag-chip');
    const correct = chip && chip.dataset.id === act.answer[i];
    zone.classList.remove('correct-slot', 'wrong-slot');
    zone.classList.add(correct ? 'correct-slot' : (chip ? 'wrong-slot' : ''));
    if (correct) score++;
  });
  const pct = Math.round(score / act.answer.length * 100);
  recordScore(idx, 'u', pct);
  setTimeout(() => showResults(score, act.answer.length, idx, 'u'), 700);
}

function checkCat(idx) {
  const act = UNPLUGGED[G.level][idx];
  let score = 0;
  act.items.forEach(item => {
    const placed = document.querySelector(`[data-cat][data-id="${item.id}"]`);
    if (placed && placed.dataset.cat === item.cat) score++;
  });
  const pct = Math.round(score / act.items.length * 100);
  recordScore(idx, 'u', pct);
  setTimeout(() => showResults(score, act.items.length, idx, 'u'), 700);
}

function checkSel(idx) {
  const act = UNPLUGGED[G.level][idx];
  let tp = 0, fp = 0, fn = 0;
  act.items.forEach(item => {
    const el = document.getElementById('sel_' + item.id);
    const selected = el.classList.contains('selected');
    el.classList.remove('selected', 'correct-sel', 'wrong-sel', 'missed-sel');
    if (item.correct && selected)  { el.classList.add('correct-sel'); tp++; }
    if (!item.correct && selected) { el.classList.add('wrong-sel'); fp++; }
    if (item.correct && !selected) { el.classList.add('missed-sel'); fn++; }
  });
  const total = act.items.filter(i => i.correct).length;
  const pct = Math.max(0, Math.round((tp - fp) / total * 100));
  recordScore(idx, 'u', pct);
  setTimeout(() => showResults(tp, total, idx, 'u'), 700);
}

function checkPseudo(idx) {
  const card = PSEUDOCARDS[G.level][idx];
  const slots = document.querySelectorAll('.seq-slot');
  let score = 0, fillable = 0;
  slots.forEach((slot, i) => {
    if (slot.classList.contains('prefilled')) return;
    fillable++;
    const chip = slot.querySelector('.code-chip');
    const correct = chip && chip.dataset.id === card.answer[i];
    slot.classList.remove('correct-slot', 'wrong-slot');
    slot.classList.add(correct ? 'correct-slot' : (chip ? 'wrong-slot' : ''));
    if (correct) score++;
  });
  const total = card.type === 'fill' ? fillable : card.slots;
  const normTotal = Math.max(total, 1);
  const pct = Math.round(score / normTotal * 100);
  recordScore(idx, 'p', pct);
  setTimeout(() => showResults(score, normTotal, idx, 'p'), 700);
}

// ═══════════════════════════════════════
// RESULTS SCREEN
// ═══════════════════════════════════════
function showResults(score, total, idx, modeKey) {
  const pct = Math.round(score / total * 100);
  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
  const tier = pct >= 90 ? 'great' : pct >= 60 ? 'ok' : 'retry';
  const msgs = {
    great: { en: '🎉 Excellent! You are a Computational Thinker!', bm: '🎉 Hebat! Anda seorang Pemikir Komputasi!' },
    ok:    { en: '👍 Good try! Check the hint and aim for 3 stars!', bm: '👍 Cubaan bagus! Semak petunjuk dan sasarkan 3 bintang!' },
    retry: { en: '💪 Keep going! Use the hint and try again!', bm: '💪 Teruskan! Gunakan petunjuk dan cuba lagi!' },
  };
  const isUnplug = modeKey === 'u';
  const acts = isUnplug ? (UNPLUGGED[G.level] || []) : (PSEUDOCARDS[G.level] || []);
  const hasNext = idx + 1 < acts.length;
  const l = lv(G.level);

  document.getElementById('resultsBody').innerHTML = `
    <div class="pop-in">
      <div class="res-stars">${stars}</div>
      <div class="res-score" style="color:var(${l.cssVar})">${pct}%</div>
      <div class="res-label">${score}/${total} ${G.lang === 'bm' ? 'betul' : 'correct'} · ${T(l)} ${isUnplug ? (G.lang === 'bm' ? 'Tanpa Peranti' : 'Unplugged') : (G.lang === 'bm' ? 'Pseudokod' : 'Pseudocode')}</div>
      <div class="res-msg ${tier}">${G.lang === 'bm' ? msgs[tier].bm : msgs[tier].en}</div>
      <div class="res-acts">
        ${hasNext ? `<button class="btn btn-success" onclick="startActivity(${idx + 1})">
          ${G.lang === 'bm' ? 'Seterusnya' : 'Next'} ▶</button>` : ''}
        <button class="btn btn-warn" onclick="startActivity(${idx})">🔄 ${G.lang === 'bm' ? 'Cuba Lagi' : 'Try Again'}</button>
        <button class="btn btn-secondary" onclick="nav('actlist','${isUnplug ? 'unplugged' : 'plugged'}')">
          📋 ${G.lang === 'bm' ? 'Senarai' : 'List'}</button>
        <button class="btn btn-secondary" onclick="nav('home')">🏠</button>
      </div>
    </div>`;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('results').classList.add('active');
  window.scrollTo(0, 0);
  refreshLang();
}

// ═══════════════════════════════════════
// PROGRESS & LOGGING
// ═══════════════════════════════════════
function recordScore(idx, modeKey, pct) {
  const key = `${G.student}_${G.level}_${modeKey}_${idx}`;
  const prev = G.prog[key];
  G.prog[key] = { done: true, pct, ts: Date.now() };
  const l = lv(G.level);
  const acts = modeKey === 'u' ? (UNPLUGGED[G.level] || []) : (PSEUDOCARDS[G.level] || []);
  const act = acts[idx];
  G.log.unshift({
    time: new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' }),
    student: G.student,
    action: `${l?.en || G.level} › ${modeKey === 'u' ? 'Unplugged' : 'Pseudo'} ${idx + 1}: ${act ? act.en : ''}`,
    pct
  });
  if (G.log.length > 80) G.log.pop();
  saveStorage();
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function renderDashboard() {
  const students = ['S1','S2','S3','S4','S5','S6'];
  let totalActs = 0, totalScore = 0, scoreCount = 0;
  students.forEach(s => {
    LEVELS.forEach(l => {
      ['u','p'].forEach(mk => {
        const acts = mk === 'u' ? (UNPLUGGED[l.id] || []) : (PSEUDOCARDS[l.id] || []);
        acts.forEach((_, i) => {
          const d = G.prog[`${s}_${l.id}_${mk}_${i}`];
          if (d) { totalActs++; totalScore += d.pct || 0; scoreCount++; }
        });
      });
    });
  });
  const avg = scoreCount ? Math.round(totalScore / scoreCount) : 0;
  const activeStudents = students.filter(s => LEVELS.some(l => G.prog[`${s}_${l.id}_u_0`] || G.prog[`${s}_${l.id}_p_0`])).length;
  const highScorers = students.filter(s => {
    const scores = [];
    LEVELS.forEach(l => ['u','p'].forEach(mk => {
      const acts = mk === 'u' ? (UNPLUGGED[l.id] || []) : (PSEUDOCARDS[l.id] || []);
      acts.forEach((_, i) => { const d = G.prog[`${s}_${l.id}_${mk}_${i}`]; if (d) scores.push(d.pct); });
    }));
    return scores.length && scores.reduce((a,b) => a+b, 0) / scores.length >= 80;
  }).length;

  document.getElementById('dashStats').innerHTML = `
    <div class="dash-stat s-blue"><div class="ds-val">${activeStudents}</div><div class="ds-lbl">Active Students</div></div>
    <div class="dash-stat s-green"><div class="ds-val">${totalActs}</div><div class="ds-lbl">Activities Done</div></div>
    <div class="dash-stat s-orange"><div class="ds-val">${avg}%</div><div class="ds-lbl">Avg Score</div></div>
    <div class="dash-stat s-purple"><div class="ds-val">${highScorers}</div><div class="ds-lbl">⭐ High Achievers</div></div>`;

  document.getElementById('dashTable').innerHTML = students.map(s => `
    <div class="pt-row">
      <div class="pt-name">${s}</div>
      ${LEVELS.map(l => {
        const pct = calcLevelProgressFor(s, l.id);
        const cls = pct >= 80 ? 'done' : pct > 0 ? 'part' : 'none';
        return `<div class="pt-cell"><span class="pt-pill ${cls}">${pct ? pct + '%' : '—'}</span></div>`;
      }).join('')}
    </div>`).join('');

  document.getElementById('dashLog').innerHTML = G.log.length === 0
    ? `<div style="padding:20px;text-align:center;color:#475569">No activity yet / Tiada aktiviti lagi</div>`
    : G.log.slice(0, 30).map(entry => `
      <div class="log-row">
        <div class="log-t">${entry.time}</div>
        <div class="log-s">${entry.student}</div>
        <div class="log-a">${entry.action}</div>
        <div class="log-p ${entry.pct >= 80 ? 'hi' : entry.pct >= 50 ? 'mid' : 'lo'}">${entry.pct}%</div>
      </div>`).join('');
}

function calcLevelProgressFor(student, lvId) {
  const u = (UNPLUGGED[lvId] || []).length;
  const p = (PSEUDOCARDS[lvId] || []).length;
  const total = u + p; if (!total) return 0;
  let done = 0;
  for (let i = 0; i < u; i++) if (G.prog[`${student}_${lvId}_u_${i}`]?.done) done++;
  for (let i = 0; i < p; i++) if (G.prog[`${student}_${lvId}_p_${i}`]?.done) done++;
  return Math.round(done / total * 100);
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type ? 't-' + type : '');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}

function showHint(msg) {
  showToast('💡 ' + msg, 'hint');
}
